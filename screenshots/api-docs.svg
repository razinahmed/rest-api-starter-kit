<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="700" fill="#fafafa"/>

  <!-- Header Bar -->
  <rect width="1200" height="80" fill="#009688"/>

  <!-- Header Title -->
  <text x="30" y="40" font-size="28" font-weight="bold" fill="white" font-family="sans-serif">REST API Starter Kit</text>

  <!-- Version Badge -->
  <rect x="40" y="50" width="80" height="24" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="50" y="65" font-size="12" fill="white" font-family="sans-serif">v1.0.0</text>

  <!-- Subtitle -->
  <text x="30" y="75" font-size="13" fill="rgba(255,255,255,0.9)" font-family="sans-serif">OpenAPI Documentation</text>

  <!-- Right side - Authorize button -->
  <rect x="1050" y="18" width="120" height="44" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1066" y="32" font-size="12" font-weight="bold" fill="#666" font-family="sans-serif">🔒 Authorize</text>
  <text x="1066" y="48" font-size="10" fill="#999" font-family="sans-serif">JWT Bearer</text>

  <!-- Main Content Area -->
  <g id="content">
    <!-- Divider line -->
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Left Sidebar (minimal - just for spacing visual) -->
    <rect x="0" y="80" width="1" height="620" fill="#f5f5f5"/>

    <!-- Content starts at x=30 -->

    <!-- AUTH SECTION -->
    <text x="30" y="120" font-size="16" font-weight="bold" fill="#333" font-family="sans-serif">Authentication</text>

    <!-- Auth tag -->
    <rect x="30" y="130" width="50" height="22" rx="3" fill="#4caf50" opacity="0.2"/>
    <text x="40" y="145" font-size="11" font-weight="bold" fill="#2e7d32" font-family="sans-serif">auth</text>

    <!-- POST /api/auth/register -->
    <rect x="30" y="160" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="160" width="50" height="50" fill="#49cc90" rx="4" opacity="0.15"/>
    <text x="45" y="183" font-size="12" font-weight="bold" fill="#49cc90" font-family="monospace">POST</text>
    <text x="90" y="183" font-size="13" fill="#333" font-family="monospace">/api/auth/register</text>
    <text x="90" y="200" font-size="11" fill="#999" font-family="sans-serif">Register a new user account</text>

    <!-- POST /api/auth/login -->
    <rect x="30" y="215" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="215" width="50" height="50" fill="#49cc90" rx="4" opacity="0.15"/>
    <text x="45" y="238" font-size="12" font-weight="bold" fill="#49cc90" font-family="monospace">POST</text>
    <text x="90" y="238" font-size="13" fill="#333" font-family="monospace">/api/auth/login</text>
    <text x="90" y="255" font-size="11" fill="#999" font-family="sans-serif">Authenticate user and get token</text>

    <!-- USERS SECTION -->
    <text x="30" y="295" font-size="16" font-weight="bold" fill="#333" font-family="sans-serif">Users</text>

    <!-- Users tag -->
    <rect x="30" y="305" width="50" height="22" rx="3" fill="#2196f3" opacity="0.2"/>
    <text x="40" y="320" font-size="11" font-weight="bold" fill="#1565c0" font-family="sans-serif">users</text>

    <!-- GET /api/users/me -->
    <rect x="30" y="335" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="335" width="50" height="50" fill="#61affe" rx="4" opacity="0.15"/>
    <text x="48" y="358" font-size="12" font-weight="bold" fill="#61affe" font-family="monospace">GET</text>
    <text x="90" y="358" font-size="13" fill="#333" font-family="monospace">/api/users/me</text>
    <text x="90" y="375" font-size="11" fill="#999" font-family="sans-serif">Get current user profile</text>

    <!-- PUT /api/users/me -->
    <rect x="30" y="390" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="390" width="50" height="50" fill="#fca130" rx="4" opacity="0.15"/>
    <text x="48" y="413" font-size="12" font-weight="bold" fill="#fca130" font-family="monospace">PUT</text>
    <text x="90" y="413" font-size="13" fill="#333" font-family="monospace">/api/users/me</text>
    <text x="90" y="430" font-size="11" fill="#999" font-family="sans-serif">Update user profile</text>

    <!-- GET /api/users -->
    <rect x="30" y="445" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="445" width="50" height="50" fill="#61affe" rx="4" opacity="0.15"/>
    <text x="48" y="468" font-size="12" font-weight="bold" fill="#61affe" font-family="monospace">GET</text>
    <text x="90" y="468" font-size="13" fill="#333" font-family="monospace">/api/users</text>
    <text x="90" y="485" font-size="11" fill="#999" font-family="sans-serif">List all users (admin only)</text>

    <!-- ITEMS SECTION -->
    <text x="30" y="525" font-size="16" font-weight="bold" fill="#333" font-family="sans-serif">Items</text>

    <!-- Items tag -->
    <rect x="30" y="535" width="50" height="22" rx="3" fill="#9c27b0" opacity="0.2"/>
    <text x="40" y="550" font-size="11" font-weight="bold" fill="#6a1b9a" font-family="sans-serif">items</text>

    <!-- POST /api/items -->
    <rect x="30" y="565" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="565" width="50" height="50" fill="#49cc90" rx="4" opacity="0.15"/>
    <text x="45" y="588" font-size="12" font-weight="bold" fill="#49cc90" font-family="monospace">POST</text>
    <text x="90" y="588" font-size="13" fill="#333" font-family="monospace">/api/items</text>
    <text x="90" y="605" font-size="11" fill="#999" font-family="sans-serif">Create a new item</text>

    <!-- GET /api/items -->
    <rect x="30" y="620" width="1140" height="50" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
    <rect x="30" y="620" width="50" height="50" fill="#61affe" rx="4" opacity="0.15"/>
    <text x="48" y="643" font-size="12" font-weight="bold" fill="#61affe" font-family="monospace">GET</text>
    <text x="90" y="643" font-size="13" fill="#333" font-family="monospace">/api/items</text>
    <text x="90" y="660" font-size="11" fill="#999" font-family="sans-serif">List all items</text>
  </g>

  <!-- Bottom section (scrollable indicator) -->
  <rect x="30" y="675" width="1140" height="1" fill="#e0e0e0"/>
  <text x="1140" y="690" font-size="10" fill="#ccc" font-family="sans-serif" text-anchor="end">More endpoints below...</text>
</svg>