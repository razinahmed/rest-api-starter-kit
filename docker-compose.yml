version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rest_api_db
    environment:
      POSTGRES_USER: apiuser
      POSTGRES_PASSWORD: apipassword
      POSTGRES_DB: api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiuser -d api_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rest_api_app
    environment:
      DATABASE_URL: postgresql+asyncpg://apiuser:apipassword@db:5432/api_db
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
