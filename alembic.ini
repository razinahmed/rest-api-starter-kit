# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to the constructor of datetime.datetime
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in the filename
# (template is end with end of `_slug`)
# you may set this to `false` to skip the truncation of
# slug length to 40 char.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Logging level for migration engine
# sqlalchemy.engine logger uses WARN level by default
sqlalchemy.echo = false

# add additional entries here to define
# logging modules and handlers
# see the examples, if you want to apply logging
# to non-guessed modules having the default level
# WARNING

[loggers]
keys = sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_sqlalchemy.engine]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
